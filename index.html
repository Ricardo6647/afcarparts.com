<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AFRICARPARTS Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <p id="loginError"></p>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
  <h1>Admin Dashboard</h1>

  <nav>
    <button onclick="showSection('cats')">Kategorien</button>
    <button onclick="showSection('products')">Produkte</button>
    <button onclick="logout()">Logout</button>
  </nav>

  <section id="cats" class="section">
    <h2>Kategorien</h2>
    <button onclick="loadCategories()">Neu laden</button>
    <ul id="catList"></ul>
  </section>

  <section id="products" class="section" style="display:none;">
    <h2>Produkte</h2>
    <button onclick="loadProducts()">Neu laden</button>
    <ul id="productList"></ul>
  </section>

</div>

<script src="admin.js"></script>
</body>
</html>
